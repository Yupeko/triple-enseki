# Netlify設定ファイル

[build]
  publish = "."

# フォーム送信後のリダイレクト先
[[redirects]]
  from = "/contact-thanks"
  to = "/contact.html"
  status = 200

# www → apex or apex → www の統一（www付きに統一）
[[redirects]]
  from = "https://triple-enseki.net/*"
  to = "https://www.triple-enseki.net/:splat"
  status = 301
  force = true

# セキュリティヘッダー
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
